name: Dashboard Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'defectdojo-dashboard/**'
      - '.github/workflows/dashboard-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'defectdojo-dashboard/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 18.x, 20.x ]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'defectdojo-dashboard/package-lock.json'

    - name: Install dependencies
      working-directory: defectdojo-dashboard
      run: npm ci

    - name: Check for syntax errors
      working-directory: defectdojo-dashboard
      run: npm run build
      continue-on-error: false

    - name: Run linting (if configured)
      working-directory: defectdojo-dashboard
      run: |
        npm run lint 2>/dev/null || echo "⚠ No lint script configured"
      continue-on-error: true

    - name: Run tests (if configured)
      working-directory: defectdojo-dashboard
      run: |
        npm test 2>/dev/null || echo "⚠ No test script configured"
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: 'defectdojo-dashboard/package-lock.json'

    - name: Install dependencies
      working-directory: defectdojo-dashboard
      run: npm ci

    - name: Build production bundle
      working-directory: defectdojo-dashboard
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dashboard-build-${{ github.sha }}
        path: defectdojo-dashboard/dist/
        retention-days: 5

  docker-build:
    runs-on: ubuntu-latest
    needs: [ lint-and-test, build ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./defectdojo-dashboard
        file: ./defectdojo-dashboard/Dockerfile
        push: false
        tags: |
          defectdojo-dashboard:${{ github.sha }}
          defectdojo-dashboard:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
