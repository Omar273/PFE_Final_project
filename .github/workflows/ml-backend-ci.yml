name: ML Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ml-backend/**'
      - '.github/workflows/ml-backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ml-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11', '3.12' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      working-directory: ml-backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8 (optional)
      working-directory: ml-backend
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: Run tests with pytest
      working-directory: ml-backend
      run: |
        pip install pytest pytest-asyncio
        pytest tests/ -v --tb=short

    - name: Test API imports
      working-directory: ml-backend
      run: |
        python -c "from api.main import app; print('✓ FastAPI app imports successfully')"

    - name: Test ML model loading
      working-directory: ml-backend
      run: |
        python -c "import joblib; m = joblib.load('models/risk_model.joblib'); print('✓ Model loads successfully')"
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Build Docker image
      run: |
        docker build -f ml-backend/dockerfile -t ml-backend:${{ github.sha }} .
        echo "✓ Docker image built successfully"

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      working-directory: ml-backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pylint

    - name: Analyze with pylint
      working-directory: ml-backend
      run: |
        pylint api/ ml/ --exit-zero --disable=C0111
      continue-on-error: true
