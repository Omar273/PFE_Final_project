name: Code Quality & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      working-directory: ml-backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt coverage pytest pytest-cov

    - name: Run tests with coverage
      working-directory: ml-backend
      run: |
        pytest tests/ --cov=api --cov=ml --cov-report=xml --cov-report=html --cov-report=term
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./ml-backend/coverage.xml
        flags: backend
        name: ml-backend-coverage
        fail_ci_if_error: false
      continue-on-error: true

    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: coverage-reports
        path: |
          ml-backend/htmlcov/
          ml-backend/coverage.xml
      continue-on-error: true

  sonarqube:
    runs-on: ubuntu-latest
    if: ${{ secrets.SONAR_HOST_URL != '' }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      working-directory: ml-backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest pytest-cov

    - name: Generate coverage report
      working-directory: ml-backend
      run: |
        pytest tests/ --cov=api --cov=ml --cov-report=xml
      continue-on-error: true

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}
      continue-on-error: true

  dependency-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

  documentation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Generate API documentation
      working-directory: ml-backend
      run: |
        pip install pdoc
        pdoc api -o ../docs/api-docs
        echo "✓ API documentation generated"
      continue-on-error: true

    - name: Upload documentation
      uses: actions/upload-artifact@v3
      with:
        name: api-documentation
        path: docs/api-docs/
      continue-on-error: true

    - name: Validate markdown files
      run: |
        find . -name "*.md" -not -path "./node_modules/*" | head -20
        echo "✓ Markdown files found"
      continue-on-error: true
